<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PixivDL Browser</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">P</span>
          <div>
            <h1>PixivDL Browser</h1>
            <p>图片下载工作台</p>
          </div>
        </div>
        <form id="pidForm" class="pid-form">
          <input id="pidInput" inputmode="numeric" autocomplete="off" placeholder="输入作品 PID" />
          <button id="fetchButton" type="submit">获取</button>
        </form>
        <div class="toolbar-actions" aria-label="快捷操作">
          <button id="focusSettingsButton" class="icon-button" type="button" title="下载设置" aria-label="下载设置">⚙</button>
          <button id="openPixivHomeButton" class="icon-button" type="button" title="打开 Pixiv" aria-label="打开 Pixiv">↗</button>
        </div>
      </header>

      <nav class="tabs" aria-label="视图">
        <div class="tab-group">
          <button id="workspaceTab" class="active" type="button">
            <span aria-hidden="true">▣</span>
            工作台
          </button>
          <button id="favoritesTab" type="button">
            <span aria-hidden="true">☆</span>
            收藏夹
          </button>
        </div>
        <button id="openWorkspaceTabButton" class="secondary-button workspace-launch-button" type="button">
          打开完整工作台
        </button>
      </nav>

      <p id="notice" class="notice" hidden></p>

      <section id="workspaceView" class="workspace">
        <aside class="summary">
          <div class="panel-title">
            <p class="eyebrow">Artwork</p>
            <h2>图片下载工作台</h2>
          </div>
          <div id="emptyState" class="empty-state">
            <strong id="emptyTitle">输入 PID 获取作品</strong>
            <span id="emptyBody">获取成功后可预览、选择并下载图片。</span>
            <button id="emptyPixivButton" class="secondary-button empty-action" type="button" hidden>
              前往 Pixiv 查看
            </button>
          </div>
          <div id="workSummary" hidden>
            <div class="cover-frame">
              <img id="coverImage" alt="" />
            </div>
            <div class="work-copy">
              <h2 id="workTitle"></h2>
              <p id="workAuthor"></p>
            </div>
            <dl class="work-meta">
              <div>
                <dt>PID</dt>
                <dd id="workPid"></dd>
              </div>
              <div>
                <dt>图片数量</dt>
                <dd id="workPages"></dd>
              </div>
              <div>
                <dt>上传时间</dt>
                <dd id="workUploadTime"></dd>
              </div>
              <div>
                <dt>收藏状态</dt>
                <dd id="workFavoriteState"></dd>
              </div>
            </dl>
            <div class="work-actions" aria-label="作品操作">
              <button id="favoriteButton" class="favorite-button" type="button">收藏</button>
              <button id="openPixivButton" class="open-pixiv-button" type="button">打开 Pixiv</button>
            </div>
          </div>
          <div id="batchSummary" hidden>
            <div class="batch-copy">
              <h2>批量下载</h2>
              <p class="batch-desc">正在依次抓取与下载队列作品</p>
            </div>
            <dl class="work-meta">
              <div>
                <dt>已完成</dt>
                <dd id="batchSuccessCount">0</dd>
              </div>
              <div>
                <dt>已失败</dt>
                <dd id="batchFailedCount">0</dd>
              </div>
              <div>
                <dt>总进度</dt>
                <dd id="batchProgressLabel">0 / 0</dd>
              </div>
            </dl>
            <div class="work-actions">
              <button id="exitBatchButton" class="favorite-button danger-button" type="button" style="width: 100%;">退出批量模式</button>
            </div>
          </div>
        </aside>

        <section class="images">
          <div class="section-head">
            <div>
              <p class="eyebrow">Images</p>
              <h2>图片选择</h2>
            </div>
            <div class="section-actions">
              <span id="selectedCountLabel" class="selection-count">已选 0 / 0</span>
              <button id="selectAllButton" class="secondary-button" type="button" disabled>全选</button>
            </div>
          </div>
          <div id="imageGrid" class="image-grid"></div>
          <div id="batchQueueView" hidden>
            <div id="batchQueueGrid" class="batch-queue-grid"></div>
          </div>
          <footer class="image-footer">
            <span>提示：点击缩略图切换选择</span>
          </footer>
        </section>

        <aside class="download">
          <div class="section-head">
            <div>
              <p class="eyebrow">Download</p>
              <h2>浏览器下载</h2>
            </div>
          </div>
          <div class="segmented">
            <button id="zipMode" class="active" type="button">ZIP</button>
            <button id="fileMode" type="button">文件</button>
          </div>
          <button id="downloadButton" class="primary-button" type="button" disabled>下载 0 张</button>
          <button id="retryDownloadButton" class="secondary-button" type="button" hidden style="margin-top: var(--space-xs);">重试下载</button>
          <div id="progress" class="progress" hidden>
            <span id="progressText"></span>
            <div><i id="progressBar"></i></div>
          </div>
          <p id="downloadMeta" class="download-meta">选择页面后下载；ZIP 适合多图归档。</p>
          <details class="advanced-settings">
            <summary>更多设置</summary>
            <form id="settingsForm" class="settings-form">
              <label class="field">
                <span>保存目录</span>
                <div class="directory-row">
                  <input id="downloadDirectoryInput" autocomplete="off" placeholder="PixivDL" />
                  <button id="browseDownloadDirectoryButton" class="secondary-button directory-browse-button" type="button">
                    浏览
                  </button>
                  <button id="clearDownloadDirectoryButton" class="secondary-button directory-clear-button" type="button" hidden>
                    默认
                  </button>
                </div>
                <small id="downloadDirectoryHint" class="field-hint">Downloads\PixivDL</small>
              </label>
              <label class="ask-location-toggle">
                <input id="askDownloadLocationInput" type="checkbox" />
                <span>下载时询问保存位置</span>
              </label>
              <label class="proxy-toggle">
                <input id="proxyEnabledInput" type="checkbox" />
                <span>本地代理</span>
              </label>
              <div class="proxy-fields">
                <select id="proxySchemeInput" aria-label="代理协议">
                  <option value="http">HTTP</option>
                  <option value="https">HTTPS</option>
                  <option value="socks4">SOCKS4</option>
                  <option value="socks5">SOCKS5</option>
                </select>
                <input id="proxyHostInput" autocomplete="off" placeholder="127.0.0.1" />
                <input id="proxyPortInput" inputmode="numeric" autocomplete="off" placeholder="7890" />
              </div>
              <div class="cache-management-group">
                <span>本地缓存</span>
                <div class="cache-stats-row">
                  <span id="cacheSizeLabel">正在计算缓存大小...</span>
                  <button id="clearCacheButton" class="secondary-button danger-button" type="button">清除缓存</button>
                </div>
              </div>
              <button id="saveSettingsButton" class="secondary-button" type="submit">保存设置</button>
            </form>
          </details>
        </aside>
      </section>

      <section id="favoritesView" class="favorites" hidden>
        <div class="section-head">
          <div>
            <p class="eyebrow">Favorites</p>
            <div class="favorites-title-line">
              <h2 id="favoritesTitle">本地收藏夹</h2>
          <div class="favorites-actions">
            <button id="importFavoritesButton" class="secondary-button" type="button" hidden>导入</button>
            <button id="exportFavoritesButton" class="secondary-button" type="button" hidden>导出</button>
            <button id="batchDownloadFavoritesButton" class="secondary-button" type="button" hidden>批量下载</button>
            <input id="importFavoritesInput" type="file" accept=".json,application/json" hidden />
          </div>
            </div>
          </div>
          <button id="openFavoritesTabButton" class="secondary-button" type="button">新标签浏览</button>
        </div>
        <form id="gallerySearchForm" class="gallery-search" hidden>
          <input id="gallerySearchInput" autocomplete="off" placeholder="搜索收藏标题 / 作者 / PID" />
          <button id="gallerySearchButton" class="secondary-button" type="submit">搜索</button>
        </form>
        <p id="favoritesStatus" class="favorites-status" hidden></p>
        <div class="favorites-layout">
          <div id="favoritesGrid" class="favorites-grid"></div>
          <aside id="favoriteDetail" class="favorite-detail" aria-label="作品详情"></aside>
        </div>
      </section>

      <div id="downloadChoiceModal" class="modal-backdrop" hidden>
        <section class="download-choice" role="dialog" aria-modal="true" aria-labelledby="downloadChoiceTitle">
          <button id="closeDownloadChoiceButton" class="modal-close" type="button" aria-label="关闭">X</button>
          <p class="eyebrow">Download</p>
          <h2 id="downloadChoiceTitle">选择下载方式</h2>
          <p id="downloadChoiceMeta" class="download-choice-meta"></p>
          <div class="download-choice-actions">
            <button id="favoriteZipDownloadButton" class="primary-button" type="button">下载 ZIP</button>
            <button id="favoriteFilesDownloadButton" class="secondary-button" type="button">下载文件</button>
          </div>
        </section>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
